<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tirage au sort</title>
<style>
  :root {
    --bg: #11131a;
    --bg-soft: #181b25;
    --accent: #ffb347;
    --accent-soft: #ffb34733;
    --text: #f4f1ea;
    --text-dim: #9a9eb0;
    --border: #2a2e3d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .screen {
    display: none;
    width: 100%;
    max-width: 420px;
    animation: fadeIn 0.5s ease;
  }

  .screen.active {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* --- Ecran 1 : connexion --- */
  .card {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
  }

  .eyebrow {
    color: var(--accent);
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .field {
    text-align: left;
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
  }

  button {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #1a1300;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: filter 0.2s, transform 0.1s;
  }

  button:hover { filter: brightness(1.08); }
  button:active { transform: scale(0.98); }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* --- Ecran 2 : timer --- */
  .timer-screen {
    text-align: center;
  }

  .timer-screen .eyebrow { margin-bottom: 16px; }

  .timer-value {
    font-size: 88px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    margin-bottom: 8px;
  }

  .timer-label {
    color: var(--text-dim);
    font-size: 14px;
  }

  /* --- Ecran 3 : resultat --- */
  .result-screen {
    text-align: center;
  }

  .winner-name {
    font-size: 40px;
    font-weight: 800;
    color: var(--accent);
    margin: 16px 0 24px;
    word-break: break-word;
  }
</style>
</head>
<body>

  <!-- ECRAN 1 : ACCUEIL / CONNEXION -->
  <section id="screen-welcome" class="screen active">
    <div class="card">
      <div class="eyebrow">Tirage au sort</div>
      <h1>Bienvenue dans le tirage au sort</h1>
      <p class="subtitle">Entre tes informations pour participer</p>

      <div class="field">
        <label for="username">Pseudo</label>
        <input type="text" id="username" placeholder="Ton pseudo" autocomplete="off">
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="off">
      </div>

      <button id="start-btn">Participer</button>
    </div>
  </section>

  <!-- ECRAN 2 : TIMER -->
  <section id="screen-timer" class="screen">
    <div class="card timer-screen">
      <div class="eyebrow">Tirage en cours</div>
      <div class="timer-value" id="timer-value">0</div>
      <div class="timer-label">secondes restantes</div>
    </div>
  </section>

  <!-- ECRAN 3 : RESULTAT -->
  <section id="screen-result" class="screen">
    <div class="card result-screen">
      <div class="eyebrow">Et le gagnant est</div>
      <div class="winner-name" id="winner-name">—</div>
      <button id="restart-btn">Refaire un tirage</button>
    </div>
  </section>

<script>
  // ====== CONFIGURATION ======
  const TIMER_DURATION = 0; // duree du timer en secondes (a regler plus tard)
  const PARTICIPANTS = ["Alice", "Bilal", "Chloé", "David", "Emma"]; // liste temporaire, a remplacer plus tard

  // ====== ELEMENTS ======
  const screenWelcome = document.getElementById('screen-welcome');
  const screenTimer = document.getElementById('screen-timer');
  const screenResult = document.getElementById('screen-result');

  const startBtn = document.getElementById('start-btn');
  const restartBtn = document.getElementById('restart-btn');
  const timerValue = document.getElementById('timer-value');
  const winnerName = document.getElementById('winner-name');

  function showScreen(screen) {
    [screenWelcome, screenTimer, screenResult].forEach(s => s.classList.remove('active'));
    screen.classList.add('active');
  }

  function runTimerThenDraw() {
    showScreen(screenTimer);
    let remaining = TIMER_DURATION;
    timerValue.textContent = remaining;

    if (remaining <= 0) {
      drawWinner();
      return;
    }

    const interval = setInterval(() => {
      remaining--;
      timerValue.textContent = remaining;
      if (remaining <= 0) {
        clearInterval(interval);
        drawWinner();
      }
    }, 1000);
  }

  function drawWinner() {
    const winner = PARTICIPANTS[Math.floor(Math.random() * PARTICIPANTS.length)];
    winnerName.textContent = winner;
    showScreen(screenResult);
  }

  startBtn.addEventListener('click', () => {
    runTimerThenDraw();
  });

  restartBtn.addEventListener('click', () => {
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    showScreen(screenWelcome);
  });
</script>

</body>
</html>
